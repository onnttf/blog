name: Publish to Discussions

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync markdown to GitHub Discussions
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -eo pipefail

          created=0
          updated=0
          skipped=0
          total=0

          # Load existing discussion data
          if [ -f "discussion.json" ]; then
            echo "Loaded existing discussion.json"
          else
            echo "[]" > discussion.json
          fi

          # Collect all markdown files that need to be published
          md_files=()
          for dir in announcements/ 2[0-9][0-9][0-9]/{01,02,03,04,05,06,07,08,09,10,11,12}/; do
            if [ -d "$dir" ]; then
              for f in "$dir"*.md; do
                [ -f "$f" ] && md_files+=("$f")
              done
            fi
          done

          if [ ${#md_files[@]} -eq 0 ]; then
            echo "No markdown files found to publish"
            exit 0
          fi

          total=${#md_files[@]}
          echo "Found $total markdown files"

          # Initialize README.md
          echo "# blog" > README.md
          echo "" >> README.md
          echo "## Table of Contents" >> README.md
          echo "" >> README.md
          echo "| Title | Labels | Last Updated |" >> README.md
          echo "| ----- | ------ | ------------ |" >> README.md

          for md_file in "${md_files[@]}"; do
            # Parse title (first line: "# Title") and body (everything after)
            title=$(sed -n '1s/^# *//p' "$md_file")
            body=$(sed '1d' "$md_file" | sed '/^$/d' | head -c -1)

            if [ -z "$title" ]; then
              echo "WARNING: No title in $md_file, skipping"
              skipped=$((skipped + 1))
              continue
            fi

            # Determine category from file path
            if [[ "$md_file" == announcements/* ]]; then
              category_slug="announcements"
            else
              category_slug="show-and-tell"
            fi

            # Find matching entry in discussion.json
            matching_id=$(jq -r --arg path "$md_file" '.[] | select(.markdownFilePath == $path) | .id // empty' discussion.json)

            if [ -z "$matching_id" ]; then
              # No matching entry — create new discussion
              echo "--- Creating new discussion: $title (from: $md_file) ---"

              # Get category ID from slug
              category_id=$(gh api graphql -f query='
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    discussionCategories(first: 20) {
                      nodes { id name slug }
                    }
                  }
                }
              ' -F owner="$REPO_OWNER" -F repo="$REPO_NAME" --jq "
                [.. | select(type == \"object\")]
                | map(select(.slug == \"$category_slug\"))
                | first.id // empty
              ")

              if [ -z "$category_id" ]; then
                echo "ERROR: Category '$category_slug' not found, skipping"
                skipped=$((skipped + 1))
                continue
              fi

              repositoryId=$(gh api repos/$REPO_OWNER/$REPO_NAME --jq '.node_id')

              result=$(gh api graphql -f query='
                mutation(
                  $repositoryId: ID!,
                  $categoryId: ID!,
                  $title: String!,
                  $body: String!
                ) {
                  createDiscussion(input: {
                    repositoryId: $repositoryId,
                    categoryId: $categoryId,
                    title: $title,
                    body: $body
                  }) {
                    discussion {
                      id
                      number
                      url
                      createdAt
                      updatedAt
                      body
                      title
                      category { id name slug }
                      labels(first: 10) { nodes { id name url } }
                      author { login }
                      authorAssociation
                    }
                  }
                }
              ' -F repositoryId="$repositoryId" \
                 -F categoryId="$category_id" \
                 -F title="$title" \
                 -F body="$body" --jq '.data.createDiscussion.discussion')

              new_id=$(echo "$result" | jq -r '.id')
              new_number=$(echo "$result" | jq -r '.number')
              new_url=$(echo "$result" | jq -r '.url')
              new_created=$(echo "$result" | jq -r '.createdAt')
              new_updated=$(echo "$result" | jq -r '.updatedAt')
              new_body=$(echo "$result" | jq -r '.body')
              new_title=$(echo "$result" | jq -r '.title')

              if [ -z "$new_id" ] || [ "$new_id" = "null" ]; then
                echo "ERROR: Failed to create discussion: $result"
                skipped=$((skipped + 1))
                continue
              fi

              echo "Created discussion: $new_url"

              # Compute canonical markdown file path
              if [ "$category_slug" = "announcements" ]; then
                canonical_md_path="announcements/${new_number}-${new_id}.md"
              else
                canonical_md_path="$(date +%Y)/$(date +%m)/${new_number}-${new_id}.md"
              fi
              jsonFilePath="discussions/${new_number}-${new_id}.json"

              # Append entry to discussion.json
              jq --arg id "$new_id" --arg number "$new_number" \
                 --arg url "$new_url" --arg createdAt "$new_created" \
                 --arg updatedAt "$new_updated" --arg category_slug "$category_slug" \
                 --arg mdPath "$canonical_md_path" --arg jsonPath "$jsonFilePath" \
                 --arg new_title "$new_title" --arg new_body "$new_body" \
                 '. += [{
                   id: $id,
                   number: ($number | tonumber),
                   title: $new_title,
                   body: $new_body,
                   url: $url,
                   createdAt: $createdAt,
                   updatedAt: $updatedAt,
                   category: { slug: $category_slug },
                   labels: [],
                   markdownFilePath: $mdPath,
                   jsonFilePath: $jsonPath
                 }]' discussion.json > discussion.json.tmp
              mv discussion.json.tmp discussion.json

              # Write JSON file
              mkdir -p $(dirname "$jsonFilePath")
              echo "$result" | jq '{
                id: .id,
                number: .number,
                url: .url,
                createdAt: .createdAt,
                updatedAt: .updatedAt,
                title: .title,
                body: .body,
                category: .category,
                labels: .labels,
                author: .author,
                authorAssociation: .authorAssociation,
                markdownFilePath: $mdPath,
                jsonFilePath: $jsonPath
              }' --arg mdPath "$canonical_md_path" --arg jsonPath "$jsonFilePath" > "$jsonFilePath"

              # Write Markdown file
              mkdir -p $(dirname "$canonical_md_path")
              printf "# %s\n\n%s\n" "$new_title" "$new_body" > "$canonical_md_path"
              echo "Written files: $jsonFilePath, $canonical_md_path"

              # Update README.md TOC
              labels=$(echo "$result" | jq -r '.labels.nodes | map("[\(.name)](https://github.com/onnttf/blog/discussions?discussions_q=label%3A\(.name))") | join(", ") // ""')
              echo "| [$new_title]($new_url) | $labels | $new_updated |" >> README.md

              created=$((created + 1))
              continue
            fi

            # Has existing ID — check if update needed
            echo "--- Checking existing discussion: $title (id: $matching_id) ---"

            remote_body=$(gh api graphql -f query='
              query($id: ID!) {
                node(id: $id) {
                  ... on Discussion {
                    body
                    updatedAt
                    title
                    url
                    category { id name slug }
                    labels(first: 10) { nodes { id name url } }
                  }
                }
              }
            ' -F id="$matching_id" --jq '.data.node')

            remote_body_text=$(echo "$remote_body" | jq -r '.body // empty')

            local_md5=$(printf '%s' "$body" | md5sum | awk '{print $1}')
            remote_md5=$(printf '%s' "$remote_body_text" | md5sum | awk '{print $1}')

            if [ "$local_md5" = "$remote_md5" ]; then
              echo "Body unchanged, skipping"
              # Still write current data to files
              entry=$(jq --arg id "$matching_id" '.[] | select(.id == $id)' discussion.json)
              if [ -n "$entry" ] && [ "$entry" != "null" ]; then
                mdPath=$(echo "$entry" | jq -r '.markdownFilePath')
                jsonPath=$(echo "$entry" | jq -r '.jsonFilePath')
                entryBody=$(echo "$entry" | jq -r '.body')
                entryTitle=$(echo "$entry" | jq -r '.title')
                entryUrl=$(echo "$entry" | jq -r '.url')
                entryUpdatedAt=$(echo "$entry" | jq -r '.updatedAt')
                entryLabels=$(echo "$entry" | jq -r '.labels.nodes | map("[\(.name)](https://github.com/onnttf/blog/discussions?discussions_q=label%3A\(.name))") | join(", ") // ""')

                mkdir -p $(dirname "$jsonPath")
                echo "$entry" > "$jsonPath"
                mkdir -p $(dirname "$mdPath")
                printf "# %s\n\n%s\n" "$entryTitle" "$entryBody" > "$mdPath"
                echo "| [$entryTitle]($entryUrl) | $entryLabels | $entryUpdatedAt |" >> README.md
              fi
              skipped=$((skipped + 1))
            else
              echo "Body changed, updating discussion..."

              result=$(gh api graphql -f query='
                mutation(
                  $discussionId: ID!,
                  $title: String!,
                  $body: String!
                ) {
                  updateDiscussion(input: {
                    discussionId: $discussionId,
                    title: $title,
                    body: $body
                  }) {
                    discussion {
                      updatedAt
                      body
                      title
                      url
                      category { id name slug }
                      labels(first: 10) { nodes { id name url } }
                    }
                  }
                }
              ' -F discussionId="$matching_id" \
                 -F title="$title" \
                 -F body="$body" --jq '.data.updateDiscussion.discussion')

              new_updated=$(echo "$result" | jq -r '.updatedAt // empty')
              new_body=$(echo "$result" | jq -r '.body')
              new_title=$(echo "$result" | jq -r '.title')
              new_url=$(echo "$result" | jq -r '.url')

              # Update discussion.json entry
              if [ -n "$new_updated" ] && [ "$new_updated" != "null" ]; then
                jq --arg id "$matching_id" --arg updatedAt "$new_updated" \
                   --arg title "$new_title" --arg body "$new_body" '
                  map(if .id == $id then
                    .updatedAt = $updatedAt |
                    .title = $title |
                    .body = $body
                  else . end)
                ' discussion.json > discussion.json.tmp
                mv discussion.json.tmp discussion.json

                # Update the markdown and json files
                entry=$(jq --arg id "$matching_id" '.[] | select(.id == $id)' discussion.json)
                if [ -n "$entry" ] && [ "$entry" != "null" ]; then
                  mdPath=$(echo "$entry" | jq -r '.markdownFilePath')
                  jsonPath=$(echo "$entry" | jq -r '.jsonFilePath')
                  entryLabels=$(echo "$result" | jq -r '.labels.nodes | map("[\(.name)](https://github.com/onnttf/blog/discussions?discussions_q=label%3A\(.name))") | join(", ") // ""')

                  mkdir -p $(dirname "$jsonPath")
                  echo "$entry" > "$jsonPath"
                  mkdir -p $(dirname "$mdPath")
                  printf "# %s\n\n%s\n" "$new_title" "$new_body" > "$mdPath"
                  echo "Updated files: $jsonPath, $mdPath"
                fi
              fi

              echo "| [$new_title]($new_url) | $(echo "$result" | jq -r '.labels.nodes | map("[\(.name)](https://github.com/onnttf/blog/discussions?discussions_q=label%3A\(.name))") | join(", ") // ""') | $new_updated |" >> README.md

              echo "Discussion updated successfully"
              updated=$((updated + 1))
            fi
          done

          echo ""
          echo "=== Sync Summary ==="
          echo "Total: $total"
          echo "Created: $created"
          echo "Updated: $updated"
          echo "Skipped (unchanged): $skipped"

      - name: Commit and Push Changes
        run: |
          set -eo pipefail
          echo "Starting the commit and push process..."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md discussion.json discussions announcements $(find . -type d -regex './[0-9]+' -exec echo {} \;)

          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping commit and push."
            exit 0
          fi

          git commit -m "chore: sync discussions"
          git push

          echo "Changes committed and pushed successfully."
